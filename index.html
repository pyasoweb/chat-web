<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="phone"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="phone"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 40px;
            cursor: pointer;
            color: #667eea;
            font-size: 18px;
        }

        .form-group.checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-group.checkbox input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }

        .form-group.checkbox label {
            margin: 0;
            font-size: 13px;
            color: #666;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Crear Cuenta</h1>

        <div id="message" class="message"></div>

        <form id="registroForm" method="POST" action="procesar_registro.php">
            <div class="form-group">
                <label for="nombre">
                    Nombre Completo <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="nombre" 
                    name="nombre" 
                    required 
                    placeholder="Juan Pérez"
                >
            </div>

            <div class="form-group">
                <label for="email">
                    Correo Electrónico <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="tu@email.com"
                >
            </div>

            <div class="form-group">
                <label for="telefono">
                    Teléfono
                </label>
                <input 
                    type="phone" 
                    id="telefono" 
                    name="telefono" 
                    placeholder="+34 600 123 456"
                >
            </div>

            <div class="form-group">
                <label for="usuario">
                    Usuario <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="usuario" 
                    name="usuario" 
                    required 
                    placeholder="juanperez"
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Contraseña <span class="required">*</span>
                </label>
                <div class="password-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Mínimo 6 caracteres"
                    >
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmar_password">
                    Confirmar Contraseña <span class="required">*</span>
                </label>
                <input 
                    type="password" 
                    id="confirmar_password" 
                    name="confirmar_password" 
                    required 
                    placeholder="Repite tu contraseña"
                >
            </div>

            <div class="form-group checkbox">
                <input 
                    type="checkbox" 
                    id="terminos" 
                    name="terminos" 
                    required
                >
                <label for="terminos">
                    Acepto los términos y condiciones <span class="required">*</span>
                </label>
            </div>

            <button type="submit">Registrarse</button>

            <div class="login-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const usuario = document.getElementById('usuario').value.trim();
            const password = document.getElementById('password').value;
            const confirmar = document.getElementById('confirmar_password').value;
            const messageDiv = document.getElementById('message');

            // Validaciones en cliente
            if (!nombre || !email || !usuario || !password || !confirmar) {
                mostrarMensaje('Por favor completa todos los campos requeridos', 'error');
                return;
            }

            if (nombre.length < 3) {
                mostrarMensaje('El nombre debe tener al menos 3 caracteres', 'error');
                return;
            }

            if (usuario.length < 4) {
                mostrarMensaje('El usuario debe tener al menos 4 caracteres', 'error');
                return;
            }

            if (password.length < 6) {
                mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            if (password !== confirmar) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                return;
            }

            if (!document.getElementById('terminos').checked) {
                mostrarMensaje('Debes aceptar los términos y condiciones', 'error');
                return;
            }

            // Enviar formulario
            const formData = new FormData(this);

            try {
                const response = await fetch('procesar_registro.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    mostrarMensaje('¡Registro exitoso! Se ha enviado un correo de confirmación a ' + email, 'success');
                    document.getElementById('registroForm').reset();
                    
                    // Redirigir después de 3 segundos
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    mostrarMensaje(data.message || 'Error en el registro', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error al conectar con el servidor', 'error');
            }
        });

        function mostrarMensaje(texto, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = texto;
            messageDiv.className = 'message ' + tipo;
            messageDiv.style.display = 'block';
            
            // Auto-ocultar después de 5 segundos si es información
            if (tipo === 'info') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
